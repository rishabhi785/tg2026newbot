<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Premium Device Auth</title>
<!-- Modern Geometric Font -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg-base: #05050a;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-muted: #94a3b8;
    
    /* Holographic Colors */
    --cyan: #00f0ff;
    --purple: #8a2be2;
    --magenta: #ff007f;
    --green: #00ff88;
    --red: #ff3366;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-base);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* --- 3D Holographic Background Orbs --- */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    animation: floatOrb 10s infinite alternate ease-in-out;
    z-index: 1;
  }
  .orb-1 {
    width: 300px; height: 300px;
    background: var(--purple);
    top: -50px; left: -100px;
  }
  .orb-2 {
    width: 250px; height: 250px;
    background: var(--cyan);
    bottom: -50px; right: -50px;
    animation-delay: -5s;
  }
  .orb-3 {
    width: 200px; height: 200px;
    background: var(--magenta);
    top: 40%; left: 30%;
    opacity: 0.4;
    animation-duration: 15s;
  }

  @keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, 40px) scale(1.2); }
  }

  /* --- Main Glassmorphism Container --- */
  .glass-card {
    position: relative;
    z-index: 10;
    width: 90%;
    max-width: 380px;
    background: var(--glass-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 35px 25px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  /* User Profile Header inside Card */
  .user-header {
    display: flex;
    align-items: center;
    gap: 15px;
    width: 100%;
    margin-bottom: 35px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .avatar {
    width: 48px; height: 48px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
  }

  .user-details { flex: 1; }
  .user-name { font-size: 16px; font-weight: 600; }
  .user-status {
    font-size: 12px;
    font-weight: 600;
    color: var(--cyan);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .user-status::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--cyan);
    animation: pulse 1.5s infinite;
  }

  /* --- 3D Holographic Loader --- */
  .hologram-container {
    position: relative;
    width: 140px; height: 140px;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 800px;
  }

  .holo-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.8s ease;
  }

  .ring-outer {
    width: 100%; height: 100%;
    border-top-color: var(--cyan);
    border-bottom-color: var(--purple);
    animation: spin3D 4s linear infinite;
  }

  .ring-inner {
    width: 75%; height: 75%;
    border-left-color: var(--magenta);
    border-right-color: var(--cyan);
    animation: spin3D 3s linear infinite reverse;
  }

  .icon-center {
    position: absolute;
    width: 60px; height: 60px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
    transition: all 0.5s ease;
  }

  .icon-center svg { width: 30px; height: 30px; stroke: var(--cyan); transition: stroke 0.5s; }

  @keyframes spin3D {
    0% { transform: rotateX(60deg) rotateY(0deg) rotateZ(0deg); }
    100% { transform: rotateX(60deg) rotateY(360deg) rotateZ(360deg); }
  }

  /* States mapping to Loader */
  .state-verified .ring-outer, .state-verified .ring-inner {
    border-color: var(--green);
    animation: none;
    transform: rotateX(0) rotateY(0) scale(1.1);
    opacity: 0.2;
  }
  .state-verified .icon-center { box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); border-color: var(--green); }
  .state-verified .icon-center svg { stroke: var(--green); }
  .state-verified .user-status { color: var(--green); }
  .state-verified .user-status::before { background: var(--green); box-shadow: 0 0 10px var(--green); }

  .state-blocked .ring-outer, .state-blocked .ring-inner {
    border-color: var(--red);
    animation: none;
    transform: rotateX(0) rotateY(0) scale(1.1);
    opacity: 0.2;
  }
  .state-blocked .icon-center { box-shadow: 0 0 30px rgba(255, 51, 102, 0.4); border-color: var(--red); }
  .state-blocked .icon-center svg { stroke: var(--red); }
  .state-blocked .user-status { color: var(--red); }
  .state-blocked .user-status::before { background: var(--red); box-shadow: 0 0 10px var(--red); }

  /* --- Texts --- */
  .title {
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    background: linear-gradient(to right, #fff, #cbd5e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: 0.3s;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
    margin-bottom: 30px;
    font-weight: 300;
  }

  /* --- Glowing Wave Progress --- */
  .progress-wrap { width: 100%; }
  
  .progress-head {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .progress-label { color: var(--cyan); letter-spacing: 1px; }
  .progress-pct { color: #fff; }

  .progress-track {
    width: 100%;
    height: 6px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--purple), var(--cyan), var(--magenta));
    background-size: 200% 100%;
    animation: waveGradient 2s linear infinite;
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
    transition: width 0.3s ease;
  }

  @keyframes waveGradient {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* --- Glass Button --- */
  .btn-glass {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid rgba(0, 255, 136, 0.3);
    color: var(--green);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    display: none;
    transition: all 0.3s;
    box-shadow: 0 10px 20px rgba(0, 255, 136, 0.1);
    margin-top: 10px;
  }
  .btn-glass:hover {
    background: rgba(0, 255, 136, 0.2);
    transform: translateY(-2px);
  }

  /* --- Alert Info --- */
  .alert-box {
    width: 100%;
    background: rgba(255, 51, 102, 0.1);
    border: 1px solid rgba(255, 51, 102, 0.3);
    padding: 15px;
    border-radius: 16px;
    font-size: 13px;
    color: #ffd6e0;
    text-align: center;
    line-height: 1.5;
    display: none;
    backdrop-filter: blur(10px);
    margin-top: 10px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<!-- Holographic Background Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Main Glass Card -->
<div class="glass-card" id="mainCard">
  
  <!-- Header inside card -->
  <div class="user-header">
    <div class="avatar" id="avatarEl">?</div>
    <div class="user-details">
      <div class="user-name" id="nameEl">Loading...</div>
      <div class="user-status" id="statusBadge">Scanning</div>
    </div>
  </div>

  <!-- Holographic 3D Loader -->
  <div class="hologram-container">
    <div class="holo-ring ring-outer"></div>
    <div class="holo-ring ring-inner"></div>
    <div class="icon-center">
      <!-- Fingerprint SVG -->
      <svg id="iconSvg" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 12v.01" opacity="0"></path>
        <path d="M7 16V9a5 5 0 0 1 10 0v7"></path>
        <path d="M5 13v-4a7 7 0 0 1 14 0v4"></path>
        <path d="M9 16v-2a3 3 0 0 1 6 0v2"></path>
        <path d="M12 21v-4"></path>
      </svg>
    </div>
  </div>

  <!-- Dynamic Texts -->
  <div class="title" id="titleEl">Verifying Device</div>
  <div class="subtitle" id="subtitleEl">Establishing a holographic handshake and verifying node integrity...</div>

  <!-- Progress Tracker -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-head">
      <div class="progress-label" id="scanLabel">ANALYZING</div>
      <div class="progress-pct" id="pctEl">0%</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Continue Button -->
  <button class="btn-glass" id="continueBtn" onclick="continueToBot()">
    PROCEED TO BOT
  </button>

  <!-- Blocked Message -->
  <div class="alert-box" id="blockedInfo">
    <strong>Connection Refused</strong><br><br>
    This device is linked to another network identity. Access is restricted to one identity per device.
  </div>

</div>

<script>
  // Init Telegram WebApp
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#05050a'); 
    tg.setBackgroundColor('#05050a');
  }

  // Set User Profile
  const user = tg?.initDataUnsafe?.user || {};
  const name = user.first_name || 'User';
  document.getElementById('nameEl').textContent = name;
  document.getElementById('avatarEl').textContent = name.charAt(0).toUpperCase();

  // Core Fingerprinting Logic (Unchanged for Backend Compatibility)
  function getPersistentDeviceId() {
    try {
      let pid = localStorage.getItem('_tg_dev_pid');
      if (!pid) {
        const arr = new Uint8Array(16);
        crypto.getRandomValues(arr);
        pid = Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
        localStorage.setItem('_tg_dev_pid', pid);
      }
      return pid;
    } catch(_) { return 'ls-blocked'; }
  }

  async function getDeviceFingerprint() {
    const signals = [];
    signals.push(getPersistentDeviceId());
    signals.push(navigator.userAgent || '');
    signals.push(navigator.language || '');
    signals.push(navigator.platform || '');
    signals.push(String(screen.width) + 'x' + String(screen.height));
    signals.push(String(screen.colorDepth));
    signals.push(String(navigator.hardwareConcurrency || 0));
    signals.push(String(navigator.deviceMemory || 0));
    signals.push(String(navigator.maxTouchPoints || 0));
    signals.push(Intl.DateTimeFormat().resolvedOptions().timeZone || '');

    try {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 200; canvas.height = 40;
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20);
      ctx.fillStyle = '#069'; ctx.font = '14px Arial'; ctx.fillText('DeviceCheck!', 2, 15);
      ctx.fillStyle = 'rgba(102,204,0,0.7)'; ctx.font = '14px Georgia'; ctx.fillText('DeviceCheck!', 4, 17);
      signals.push(canvas.toDataURL());
    } catch (_) { signals.push('canvas-blocked'); }

    try {
      const gl = document.createElement('canvas').getContext('webgl');
      if (gl) {
        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
        if (dbg) {
          signals.push(gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL));
          signals.push(gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL));
        }
      }
    } catch (_) { signals.push('webgl-blocked'); }

    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const analyser = audioCtx.createAnalyser();
      const gain = audioCtx.createGain();
      oscillator.connect(analyser); analyser.connect(gain); gain.connect(audioCtx.destination);
      oscillator.type = 'triangle'; oscillator.frequency.value = 10000; gain.gain.value = 0;
      oscillator.start(0);
      const buf = new Float32Array(analyser.frequencyBinCount);
      analyser.getFloatFrequencyData(buf);
      oscillator.stop(); audioCtx.close();
      signals.push(String(buf[0]));
    } catch (_) { signals.push('audio-blocked'); }

    const raw = signals.join('|!|');
    try {
      const encoded = new TextEncoder().encode(raw);
      const hashBuf = await crypto.subtle.digest('SHA-256', encoded);
      const hashArr = Array.from(new Uint8Array(hashBuf));
      return hashArr.map(b => b.toString(16).padStart(2, '0')).join('');
    } catch (_) {
      let h = 0;
      for (let i = 0; i < raw.length; i++) h = (Math.imul(31, h) + raw.charCodeAt(i)) | 0;
      return Math.abs(h).toString(16).padStart(8, '0');
    }
  }

  // Smooth Progress Animation
  function animateProgress(target, duration, onDone) {
    const fill = document.getElementById('progressFill');
    const pct = document.getElementById('pctEl');
    const label = document.getElementById('scanLabel');
    let current = parseInt(fill.style.width) || 0;
    const start = performance.now();

    const messages = [
      [0, 'INITIALIZING'],
      [30, 'GATHERING NODE DATA'],
      [60, 'ENCRYPTING SIGNATURE'],
      [85, 'FINALIZING AUTH']
    ];

    function step(now) {
      const elapsed = now - start;
      const prog = Math.min(elapsed / duration, 1);
      current = Math.round(prog * (target - (parseInt(fill.style.width)||0)) + (parseInt(fill.style.width)||0));
      fill.style.width = current + '%';
      pct.textContent = current + '%';

      const msg = messages.filter(m => m[0] <= current).pop();
      if (msg) label.textContent = msg[1];

      if (prog < 1) requestAnimationFrame(step);
      else if (onDone) onDone();
    }
    requestAnimationFrame(step);
  }

  // Transition to Verified UI
  function showVerified() {
    document.getElementById('mainCard').classList.add('state-verified');
    document.getElementById('titleEl').textContent = 'Identity Verified';
    document.getElementById('titleEl').style.background = 'var(--green)';
    document.getElementById('titleEl').style.webkitTextFillColor = 'var(--green)';
    document.getElementById('subtitleEl').textContent = 'Authentication complete. Your connection is highly secure.';
    document.getElementById('statusBadge').textContent = 'Active';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('continueBtn').style.display = 'block';
    
    // Checkmark SVG
    document.getElementById('iconSvg').innerHTML = `
      <polyline points="20 6 9 17 4 12" stroke-width="2.5"></polyline>
    `;
  }

  // Transition to Blocked UI
  function showBlocked() {
    document.getElementById('mainCard').classList.add('state-blocked');
    document.getElementById('titleEl').textContent = 'Access Denied';
    document.getElementById('titleEl').style.background = 'var(--red)';
    document.getElementById('titleEl').style.webkitTextFillColor = 'var(--red)';
    document.getElementById('subtitleEl').style.display = 'none';
    document.getElementById('statusBadge').textContent = 'Blocked';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('blockedInfo').style.display = 'block';

    // X SVG
    document.getElementById('iconSvg').innerHTML = `
      <line x1="18" y1="6" x2="6" y2="18" stroke-width="2.5"></line>
      <line x1="6" y1="6" x2="18" y2="18" stroke-width="2.5"></line>
    `;
  }

  function continueToBot() {
    if (tg) {
      try { tg.switchInlineQuery('verified', ['bots']); } 
      catch (e) { console.log(e); }
      setTimeout(() => { tg.close(); }, 300);
    }
  }

  // Main Verification Flow
  async function startVerification() {
    const initData = tg?.initData || '';

    animateProgress(40, 1500, async () => {
      const deviceId = await getDeviceFingerprint();

      animateProgress(80, 1200, async () => {
        try {
          const persistentId = getPersistentDeviceId();
          const response = await fetch('/bot/api/verify-device', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ init_data: initData, device_id: deviceId, persistent_id: persistentId }),
          });

          const data = await response.json();

          animateProgress(100, 500, () => {
            setTimeout(() => {
              if (data.status === 'verified') showVerified();
              else showBlocked();
            }, 300);
          });

        } catch (err) {
          animateProgress(100, 400, () => {
            setTimeout(() => showBlocked(), 300);
          });
        }
      });
    });
  }

  // Auto-start on load
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(startVerification, 800);
  });
</script>
</body>
</html>
