<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Device Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    /* Exact colors from your screenshot */
    --bg-main: #0B0E17;
    --bg-card: #121722;
    --text-primary: #FFFFFF;
    --text-secondary: #8B94A5;
    
    --neon-blue: #3B82F6;
    --neon-green: #00E676;
    --neon-orange: #FF9800;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* --- Top Header Profile --- */
  .header {
    width: 100%;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background-color: #1E293B;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  .user-info {
    display: flex;
    flex-direction: column;
  }

  .user-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .user-id {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* Status Badge */
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
  }
  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .badge-scanning {
    background: rgba(59, 130, 246, 0.15);
    color: var(--neon-blue);
    border: 1px solid rgba(59, 130, 246, 0.3);
  }
  .badge-scanning::before { background: var(--neon-blue); animation: pulse 1.5s infinite; }

  .badge-active {
    background: rgba(0, 230, 118, 0.15);
    color: var(--neon-green);
    border: 1px solid rgba(0, 230, 118, 0.3);
  }
  .badge-active::before { background: var(--neon-green); }

  .badge-warning {
    background: rgba(255, 152, 0, 0.15);
    color: var(--neon-orange);
    border: 1px solid rgba(255, 152, 0, 0.3);
  }
  .badge-warning::before { background: var(--neon-orange); }

  /* --- Main Card --- */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: var(--bg-card);
    border-radius: 24px;
    padding: 40px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
  }

  /* --- Glowing Icon & Concentric Rings --- */
  .icon-wrapper {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.5s ease;
  }
  .ring-1 { width: 100%; height: 100%; opacity: 0.3; }
  .ring-2 { width: 75%; height: 75%; opacity: 0.6; }

  .icon-inner {
    position: relative;
    z-index: 2;
    width: 50px; height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.5s ease;
  }
  .icon-inner svg {
    width: 100%; height: 100%;
    transition: all 0.5s ease;
  }

  /* States mapping to icon/rings */
  .state-scanning .ring { border-color: var(--neon-blue); }
  .state-scanning .icon-inner svg { stroke: var(--neon-blue); filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.8)); }
  
  .state-verified .ring { border-color: var(--neon-green); }
  .state-verified .icon-inner svg { stroke: var(--neon-green); filter: drop-shadow(0 0 8px rgba(0, 230, 118, 0.8)); }

  .state-blocked .ring { border-color: var(--neon-orange); }
  .state-blocked .icon-inner svg { stroke: var(--neon-orange); filter: drop-shadow(0 0 8px rgba(255, 152, 0, 0.8)); }

  /* --- Text Styles --- */
  .title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 10px;
    text-align: center;
    transition: color 0.3s;
  }
  .title.green { color: var(--neon-green); }
  .title.orange { color: var(--neon-orange); }

  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 30px;
  }

  /* --- Progress Bar --- */
  .progress-wrap { width: 100%; }
  
  .progress-bg {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--neon-blue);
    border-radius: 4px;
    box-shadow: 0 0 10px var(--neon-blue);
    transition: width 0.2s linear;
  }

  .progress-texts {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    font-weight: 600;
    color: var(--neon-blue);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* --- Glowing Button --- */
  .btn-continue {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    background: var(--neon-green);
    color: #000;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
    display: none;
    transition: all 0.2s;
  }
  .btn-continue:active { transform: scale(0.98); box-shadow: 0 0 10px rgba(0, 230, 118, 0.6); }

  /* --- Friendly Warning Box --- */
  .alert-box {
    width: 100%;
    background: rgba(255, 152, 0, 0.1);
    border: 1px solid rgba(255, 152, 0, 0.2);
    border-radius: 12px;
    padding: 14px;
    font-size: 12px;
    color: #ffcc80;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 20px;
    display: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<!-- Header Profile -->
<div class="header">
  <div class="header-left">
    <div class="avatar" id="avatarEl">?</div>
    <div class="user-info">
      <div class="user-name" id="nameEl">Loading...</div>
      <div class="user-id" id="idEl">ID: —</div>
    </div>
  </div>
  <div class="badge badge-scanning" id="statusBadge">Scanning</div>
</div>

<!-- Main Area -->
<div class="main-content">
  <div class="card">
    
    <!-- Icon & Rings -->
    <div class="icon-wrapper state-scanning" id="iconWrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="icon-inner">
        <!-- Default Fingerprint SVG -->
        <svg id="iconSvg" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22" stroke-dasharray="4 4" opacity="0.3"/>
          <path d="M7.5 9.5C7.5 9.5 9.5 7 12 7C14.5 7 16.5 9.5 16.5 9.5"/>
          <path d="M5.5 13C5.5 13 8 9.5 12 9.5C16 9.5 18.5 13 18.5 13"/>
          <path d="M8 16.5C8 16.5 10.5 13.5 12 13.5C13.5 13.5 15.5 15.5 15.5 15.5"/>
          <path d="M10 19C10 19 11 16.5 12 16.5C13 16.5 14 19 14 19"/>
        </svg>
      </div>
    </div>

    <!-- Texts -->
    <div class="title" id="titleEl">Verifying Device</div>
    <div class="subtitle" id="subtitleEl">Establishing secure handshake...</div>

    <!-- Friendly Alert (Hidden by default) -->
    <div class="alert-box" id="blockedInfo">
      Device already registered. Referral bonus voided for multi-accounts, but you can still use the bot and earn normally!
    </div>

    <!-- Progress Tracker -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-texts">
        <span id="scanLabel">ANALYSIS IN PROGRESS</span>
        <span id="pctEl">0%</span>
      </div>
    </div>

    <!-- Glowing Continue Button -->
    <button class="btn-continue" id="continueBtn" onclick="continueToBot()">
      CONTINUE TO BOT
    </button>

  </div>
</div>

<script>
  // Init Telegram WebApp
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0B0E17'); 
    tg.setBackgroundColor('#0B0E17');
  }

  // Populate User Info (Uses Photo URL if available)
  const user = tg?.initDataUnsafe?.user || {};
  const name = user.first_name || 'User';
  const userId = user.id || '—';
  
  document.getElementById('nameEl').textContent = name;
  document.getElementById('idEl').textContent = 'ID: ' + userId;
  
  const avatarEl = document.getElementById('avatarEl');
  if (user.photo_url) {
    avatarEl.style.backgroundImage = `url(${user.photo_url})`;
    avatarEl.textContent = ''; // Clear text if image exists
  } else {
    avatarEl.textContent = name.charAt(0).toUpperCase();
  }

  // Core Fingerprinting Logic
  function getPersistentDeviceId() {
    try {
      let pid = localStorage.getItem('_tg_dev_pid');
      if (!pid) {
        const arr = new Uint8Array(16);
        crypto.getRandomValues(arr);
        pid = Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
        localStorage.setItem('_tg_dev_pid', pid);
      }
      return pid;
    } catch(_) { return 'ls-blocked'; }
  }

  async function getDeviceFingerprint() {
    const signals = [];
    signals.push(getPersistentDeviceId());
    signals.push(navigator.userAgent || '');
    signals.push(navigator.language || '');
    signals.push(navigator.platform || '');
    signals.push(String(screen.width) + 'x' + String(screen.height));
    signals.push(String(screen.colorDepth));
    signals.push(String(navigator.hardwareConcurrency || 0));
    signals.push(String(navigator.deviceMemory || 0));
    signals.push(String(navigator.maxTouchPoints || 0));
    signals.push(Intl.DateTimeFormat().resolvedOptions().timeZone || '');

    try {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 200; canvas.height = 40;
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20);
      ctx.fillStyle = '#069'; ctx.font = '14px Arial'; ctx.fillText('DeviceCheck!', 2, 15);
      ctx.fillStyle = 'rgba(102,204,0,0.7)'; ctx.font = '14px Georgia'; ctx.fillText('DeviceCheck!', 4, 17);
      signals.push(canvas.toDataURL());
    } catch (_) { signals.push('canvas-blocked'); }

    try {
      const gl = document.createElement('canvas').getContext('webgl');
      if (gl) {
        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
        if (dbg) {
          signals.push(gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL));
          signals.push(gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL));
        }
      }
    } catch (_) { signals.push('webgl-blocked'); }

    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const analyser = audioCtx.createAnalyser();
      const gain = audioCtx.createGain();
      oscillator.connect(analyser); analyser.connect(gain); gain.connect(audioCtx.destination);
      oscillator.type = 'triangle'; oscillator.frequency.value = 10000; gain.gain.value = 0;
      oscillator.start(0);
      const buf = new Float32Array(analyser.frequencyBinCount);
      analyser.getFloatFrequencyData(buf);
      oscillator.stop(); audioCtx.close();
      signals.push(String(buf[0]));
    } catch (_) { signals.push('audio-blocked'); }

    const raw = signals.join('|!|');
    try {
      const encoded = new TextEncoder().encode(raw);
      const hashBuf = await crypto.subtle.digest('SHA-256', encoded);
      const hashArr = Array.from(new Uint8Array(hashBuf));
      return hashArr.map(b => b.toString(16).padStart(2, '0')).join('');
    } catch (_) {
      let h = 0;
      for (let i = 0; i < raw.length; i++) h = (Math.imul(31, h) + raw.charCodeAt(i)) | 0;
      return Math.abs(h).toString(16).padStart(8, '0');
    }
  }

  // Smooth Progress Animation
  function animateProgress(target, duration, onDone) {
    const fill = document.getElementById('progressFill');
    const pct = document.getElementById('pctEl');
    let current = parseInt(fill.style.width) || 0;
    const start = performance.now();

    function step(now) {
      const elapsed = now - start;
      const prog = Math.min(elapsed / duration, 1);
      current = Math.round(prog * (target - (parseInt(fill.style.width)||0)) + (parseInt(fill.style.width)||0));
      fill.style.width = current + '%';
      pct.textContent = current + '%';

      if (prog < 1) requestAnimationFrame(step);
      else if (onDone) onDone();
    }
    requestAnimationFrame(step);
  }

  // State: Verified
  function showVerified() {
    document.getElementById('iconWrap').className = 'icon-wrapper state-verified';
    
    // Change Icon to Checkmark
    document.getElementById('iconSvg').innerHTML = `
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke-width="2"/>
      <polyline points="22 4 12 14.01 9 11.01" stroke-width="2"/>
    `;
    
    let titleEl = document.getElementById('titleEl');
    titleEl.textContent = 'Verified Successfully';
    titleEl.className = 'title green';
    
    document.getElementById('subtitleEl').textContent = "You're verified successfully, you can use our bot now.";
    
    // Update Top Badge
    let badge = document.getElementById('statusBadge');
    badge.className = 'badge badge-active';
    badge.textContent = 'Active';

    // Hide Progress, Show Button
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('continueBtn').style.display = 'block';
  }

  // State: Device Notice / Multi-Account Warning
  function showBlocked() {
    document.getElementById('iconWrap').className = 'icon-wrapper state-blocked';
    
    // Change Icon to Exclamation Alert
    document.getElementById('iconSvg').innerHTML = `
      <circle cx="12" cy="12" r="10" stroke-width="2"/>
      <line x1="12" y1="8" x2="12" y2="12" stroke-width="2"/>
      <line x1="12" y1="16" x2="12.01" y2="16" stroke-width="2.5"/>
    `;

    let titleEl = document.getElementById('titleEl');
    titleEl.textContent = 'Device Notice';
    titleEl.className = 'title orange';

    document.getElementById('subtitleEl').style.display = 'none';
    
    // Update Top Badge
    let badge = document.getElementById('statusBadge');
    badge.className = 'badge badge-warning';
    badge.textContent = 'Warning';

    // Show Warning text and Continue button
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('blockedInfo').style.display = 'block';
    document.getElementById('continueBtn').style.display = 'block';
  }

  // Button Action
  function continueToBot() {
    if (tg) {
      try { tg.switchInlineQuery('verified', ['bots']); } 
      catch (e) { console.log(e); }
      setTimeout(() => { tg.close(); }, 300);
    }
  }

  // Main Flow
  async function startVerification() {
    const initData = tg?.initData || '';

    animateProgress(40, 1500, async () => {
      const deviceId = await getDeviceFingerprint();

      animateProgress(70, 1000, async () => {
        try {
          const persistentId = getPersistentDeviceId();
          const response = await fetch('/bot/api/verify-device', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ init_data: initData, device_id: deviceId, persistent_id: persistentId }),
          });

          const data = await response.json();

          animateProgress(100, 500, () => {
            setTimeout(() => {
              if (data.status === 'verified') showVerified();
              else showBlocked();
            }, 300);
          });

        } catch (err) {
          animateProgress(100, 400, () => {
            setTimeout(() => showBlocked(), 300);
          });
        }
      });
    });
  }

  // Start on load
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(startVerification, 800);
  });
</script>
</body>
</html>
